<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 8 | Forms | Heroes</title>
</head>
<body>
    <main>
        <form id="hero">
            <label for="heroName">
                <input type="text" id="heroName" name="heroName" autofocus placeholder="Your Super Hero Name" maxlength="32">
            </label>
            <br>
            <br>
            <label for="realName">Real Name:
                <input type="password" name="realName" id="realName">
            </label>
            <br>
            <br>
            <p>Super Powers:</p>
            <label for="flight">Flight:
                <input type="checkbox" id="flight" value="Flight" name="powers">
            </label>
            <label for="strength">Super Strength
                <input type="checkbox" id="strength" value="Srength" name="powers">
            </label>
            <label for="speed">Super Speed
                <input type="checkbox" id="speed" value="Super Speed" name="powers">
            </label>
            <label for="energy">Energy Blasts:
                <input type="checkbox" id="energy" value="Energy Blasts" name="powers">
            </label>
            <label for="telekenesis">Telekenesis
                <input type="checkbox" id="telekenesis" value="Telekenesis" name="powers">
            </label>
            <br>
            <br>
            <button type="submit">Submit</button>
        </form>
    </main>
    <script src="/chapter_8_forms/main.js"></script>
</body>
</html>
