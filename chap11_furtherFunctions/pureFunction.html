<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Function</title>
</head>
<body>

    <button onclick="reverse(string)">Click me</button>
    <div id="output"></div>

    <script>
        function reverse(string) {
            return string.split('').reverse().join('');
        }

        console.log(reverse('Daniel'));
        document.getElementById('output').innerHTML = reverse('Daniel');
    </script>
</body>
</html>
